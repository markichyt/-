<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0b1425">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ConsultantLM — Is Your Firm Ready?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="quiz-wrapper">
  <div class="top-bar">
    <span class="back-link" id="backBtn">&larr; Back</span>
    <div class="global-scale" id="globalScale">
      <div class="global-scale-bar">
        <div class="global-scale-fill" id="globalFill"></div>
      </div>
    </div>
    <span class="global-scale-pct" id="globalPct">0%</span>
  </div>

  <div class="logo-area">
    <img src="./images/logo/logo_en.svg" alt="ConsultantLM" class="logo">
  </div>

  <div class="card-stack" id="cardStack">
    <div class="stack-card behind-2" id="stackCard3"><div class="card-content"></div></div>
    <div class="stack-card behind-1" id="stackCard2"><div class="card-content"></div></div>
    <div class="stack-card active" id="mainCard"><div class="card-content" id="cardContent"></div></div>
  </div>
</div>

<script src="main.js"></script>
</body>
</html>
