<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>ConsultantLM — AI Content Factory</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-1: #ffffff;
    --bg-2: #ffffff;
    --bg-3: #ffffff;
    --accent: #00b4d8;
    --accent-2: #4cc9f0;
    --pos: #10b981;
    --neg: #ef4444;
    --text: #1a1a2e;
    --muted: #94a3b8;
    --tiny: #64748b;
    --card-bg: #f5f7fa;
    --card-border: #e5e7eb;
    --divider: #e5e7eb;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: #ffffff;
    font-family: 'Inter', system-ui, sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }

  /* ---------- Stage ---------- */
  .stage {
    width: 360px;
    height: 640px;
    position: relative;
    overflow: hidden;
    background: #ffffff;
    box-shadow: 0 8px 30px rgba(0,0,0,.08), 0 0 0 1px #e5e7eb;
    border-radius: 22px;
    isolation: isolate;
  }

  /* ambient glow */
  .stage::before {
    content: "";
    position: absolute; inset: -40%;
    background:
      radial-gradient(circle at 20% 10%, rgba(0,180,216,0.04), transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(76,201,240,0.03), transparent 45%);
    pointer-events: none;
    z-index: 0;
    animation: ambient 12s ease-in-out infinite;
  }
  @keyframes ambient {
    0%, 100% { transform: translate(0,0); }
    50% { transform: translate(-2%, 2%); }
  }

  /* subtle grid — removed for light theme */
  .stage::after {
    display: none;
  }

  .frame { position: relative; z-index: 1; padding: 18px 18px 16px; height: 100%; display: flex; flex-direction: column; }

  /* ---------- Logo ---------- */
  .logo {
    display: flex; align-items: center; gap: 8px;
    opacity: 0; animation: fadeUp 0.6s ease-out 0.1s forwards;
  }
  .logo-mark {
    width: 22px; height: 22px;
    border-radius: 6px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    box-shadow: 0 0 10px rgba(0,180,216,0.3);
    position: relative;
  }
  .logo-mark::after {
    content: "";
    position: absolute; inset: 4px;
    border: 1.5px solid rgba(255,255,255,0.9);
    border-radius: 2px;
  }
  .logo-text { line-height: 1; }
  .logo-name {
    font-size: 14px; font-weight: 800; letter-spacing: 1.6px; color: #1a1a2e;
  }

  /* ---------- Heading ---------- */
  .heading {
    margin-top: 4px;
    opacity: 0; animation: fadeUp 0.6s ease-out 0.35s forwards;
  }
  .h-title {
    font-size: 22px; font-weight: 700; line-height: 1.15; color: #1a1a2e;
    letter-spacing: -0.3px;
  }
  .h-title .accent { color: var(--accent); }
  .h-sub {
    font-size: 13px; font-weight: 400; color: var(--muted); margin-top: 6px;
    line-height: 1.35;
  }

  /* ---------- Pipeline ---------- */
  .pipeline {
    margin-top: 14px;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 0;
    align-items: stretch;
    background: #f5f7fa;
    border: 1px solid #e5e7eb;
    border-radius: 14px;
    padding: 10px 6px;
  }
  .step {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    position: relative;
    opacity: 0; transform: translateY(8px);
  }
  .step-icon {
    width: 30px; height: 30px;
    border-radius: 9px;
    background: linear-gradient(180deg, rgba(0,180,216,0.12), rgba(0,180,216,0.04));
    border: 1px solid rgba(0,180,216,0.25);
    display: flex; align-items: center; justify-content: center;
    color: var(--accent);
    box-shadow: 0 2px 8px rgba(0,180,216,0.08);
  }
  .step-icon svg { width: 14px; height: 14px; }
  .step-label {
    font-size: 9px; font-weight: 600; color: var(--muted); letter-spacing: 0.4px; text-transform: uppercase;
  }
  /* arrows between steps */
  .step:not(:last-child)::after {
    content: "";
    position: absolute;
    top: 14px;
    right: -6px;
    width: 12px;
    height: 1.5px;
    background: linear-gradient(90deg, rgba(0,180,216,0.6), rgba(76,201,240,0.2));
    transform: scaleX(0);
    transform-origin: left;
  }
  .step:not(:last-child)::before {
    content: "";
    position: absolute;
    top: 11px;
    right: -7px;
    width: 0; height: 0;
    border-left: 4px solid var(--accent);
    border-top: 3px solid transparent;
    border-bottom: 3px solid transparent;
    opacity: 0;
  }

  /* staggered animation */
  .step:nth-child(1) { animation: stepIn 0.35s ease-out 1.0s forwards; }
  .step:nth-child(2) { animation: stepIn 0.35s ease-out 1.3s forwards; }
  .step:nth-child(3) { animation: stepIn 0.35s ease-out 1.6s forwards; }
  .step:nth-child(4) { animation: stepIn 0.35s ease-out 1.9s forwards; }
  .step:nth-child(5) { animation: stepIn 0.35s ease-out 2.2s forwards; }
  .step:nth-child(1)::after { animation: arrowDraw 0.25s ease-out 1.3s forwards; }
  .step:nth-child(2)::after { animation: arrowDraw 0.25s ease-out 1.6s forwards; }
  .step:nth-child(3)::after { animation: arrowDraw 0.25s ease-out 1.9s forwards; }
  .step:nth-child(4)::after { animation: arrowDraw 0.25s ease-out 2.2s forwards; }
  .step:nth-child(1)::before { animation: arrowHead 0.2s ease-out 1.5s forwards; }
  .step:nth-child(2)::before { animation: arrowHead 0.2s ease-out 1.8s forwards; }
  .step:nth-child(3)::before { animation: arrowHead 0.2s ease-out 2.1s forwards; }
  .step:nth-child(4)::before { animation: arrowHead 0.2s ease-out 2.4s forwards; }

  /* ---------- Before / After card ---------- */
  .ba {
    margin-top: 14px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 16px;
    padding: 12px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    position: relative;
    opacity: 0; animation: fadeUp 0.5s ease-out 3.0s forwards;
  }
  .ba-side {
    border-radius: 12px;
    padding: 10px;
    position: relative;
    overflow: hidden;
  }
  .ba-before {
    background: linear-gradient(180deg, rgba(239,68,68,0.10), rgba(239,68,68,0.04));
    border: 1px solid rgba(239,68,68,0.22);
    opacity: 0; animation: fadeIn 0.4s ease-out 3.2s forwards;
  }
  .ba-after {
    background: linear-gradient(180deg, rgba(16,185,129,0.12), rgba(16,185,129,0.05));
    border: 1px solid rgba(16,185,129,0.28);
    opacity: 0; transform: translateX(20px);
    animation: slideInRight 0.5s ease-out 3.9s forwards;
  }
  .ba-eyebrow {
    font-size: 10px; font-weight: 600; letter-spacing: 0.6px;
    text-transform: uppercase;
    display: flex; align-items: center; gap: 5px;
  }
  .ba-before .ba-eyebrow { color: #ef4444; }
  .ba-after .ba-eyebrow { color: #10b981; }
  .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: currentColor;
    box-shadow: 0 0 6px currentColor;
  }
  .ba-label { font-size: 11px; color: var(--muted); margin-top: 6px; }
  .ba-row { display: flex; justify-content: space-between; align-items: baseline; margin-top: 6px; }
  .ba-row-key { font-size: 10px; color: var(--tiny); text-transform: uppercase; letter-spacing: 0.5px; }
  .ba-row-val { font-size: 14px; font-weight: 700; color: #1a1a2e; font-variant-numeric: tabular-nums; }
  .ba-after .ba-row-val { color: #1a1a2e; }

  .ba-badge {
    position: absolute;
    top: -10px; right: -8px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px; font-weight: 700;
    background: rgba(16,185,129,0.15);
    color: var(--pos);
    border: 1px solid rgba(16,185,129,0.4);
    box-shadow: 0 4px 14px rgba(16,185,129,0.2);
    opacity: 0;
    animation: badgeIn 0.4s ease-out 4.4s forwards, badgePulse 0.6s ease-in-out 5.0s 1;
  }

  /* mini sparkline-ish bar inside cards */
  .ba-bar {
    height: 6px; border-radius: 3px;
    background: #e5e7eb;
    margin-top: 8px;
    overflow: hidden;
    position: relative;
  }
  .ba-bar > i {
    display: block;
    height: 100%;
    border-radius: 3px;
    width: 0;
  }
  .ba-before .ba-bar > i {
    background: linear-gradient(90deg, rgba(239,68,68,0.6), rgba(239,68,68,0.3));
    animation: fillBar 1.0s ease-out 3.5s forwards;
    --w: 18%;
  }
  .ba-after .ba-bar > i {
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    animation: fillBarLong 1.2s ease-out 4.2s forwards;
    --w: 92%;
  }
  @keyframes fillBar { to { width: var(--w); } }
  @keyframes fillBarLong { to { width: var(--w); } }

  /* ---------- Socials ---------- */
  .socials {
    margin-top: 14px;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
  }
  .soc {
    background: #f5f7fa;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    padding: 8px 4px 6px;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    opacity: 0; transform: translateY(8px);
  }
  .soc-icon {
    width: 26px; height: 26px;
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    color: #fff;
    flex-shrink: 0;
  }
  .soc-icon svg { width: 14px; height: 14px; }
  .soc-ig { background: linear-gradient(135deg, #f58529, #dd2a7b 50%, #8134af 100%); }
  .soc-fb { background: #1877f2; }
  .soc-li { background: #0a66c2; }
  .soc-tt { background: #010101; position: relative; }
  .soc-tt::after {
    content: ""; position: absolute; inset: 0; border-radius: 7px;
    box-shadow: inset 0 0 0 1px rgba(0,242,234,0.4);
  }
  .soc-yt { background: #ff0000; }
  .soc-likes {
    font-size: 10px; font-weight: 700; color: #444;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.3px;
  }
  .soc-likes::before {
    content: "♥ ";
    color: var(--accent);
  }
  .soc:nth-child(1) { animation: socIn 0.4s ease-out 5.6s forwards; }
  .soc:nth-child(2) { animation: socIn 0.4s ease-out 5.75s forwards; }
  .soc:nth-child(3) { animation: socIn 0.4s ease-out 5.9s forwards; }
  .soc:nth-child(4) { animation: socIn 0.4s ease-out 6.05s forwards; }
  .soc:nth-child(5) { animation: socIn 0.4s ease-out 6.2s forwards; }

  /* counters */
  .count { display: inline-block; }

  /* ---------- Total reach ---------- */
  .total {
    margin-top: 18px;
    text-align: center;
    opacity: 0; transform: scale(0.85);
    animation: zoomIn 0.6s cubic-bezier(.2,.9,.3,1.4) 8.0s forwards;
  }
  .total-label {
    font-size: 12px; color: var(--muted); letter-spacing: 1.6px;
    text-transform: uppercase; font-weight: 600;
  }
  .total-num {
    font-size: 60px; font-weight: 800; line-height: 1.0;
    background: linear-gradient(180deg, var(--accent-2), var(--accent));
    -webkit-background-clip: text; background-clip: text; color: transparent;
    text-shadow: 0 0 24px rgba(0,180,216,0.15);
    font-variant-numeric: tabular-nums;
    letter-spacing: -1.5px;
    margin-top: 6px;
  }
  .total-foot {
    font-size: 11px; color: var(--tiny); margin-top: 8px; letter-spacing: 0.6px;
  }

  /* ---------- Keyframes ---------- */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; } to { opacity: 1; }
  }
  @keyframes slideInRight {
    from { opacity: 0; transform: translateX(20px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes stepIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes arrowDraw {
    from { transform: scaleX(0); }
    to   { transform: scaleX(1); }
  }
  @keyframes arrowHead {
    from { opacity: 0; transform: translateX(-3px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes socIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes badgeIn {
    from { opacity: 0; transform: scale(0.7) rotate(-6deg); }
    to   { opacity: 1; transform: scale(1) rotate(0); }
  }
  @keyframes badgePulse {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.08); }
  }
  @keyframes zoomIn {
    from { opacity: 0; transform: scale(0.8); }
    to   { opacity: 1; transform: scale(1); }
  }

  /* ---------- Master loop: replay everything every 12s ---------- */
  .frame {
    animation: loop 12s linear infinite;
  }
  @keyframes loop {
    /* trick: re-trigger all child animations by toggling animation-name on root */
    0%, 100% {}
  }

  /* We re-run by toggling a class via JS using key instead — simpler: use animation-iteration-count: infinite via offset.
     Implementation note: the easiest reliable loop is to wrap everything in a container that gets replaced each cycle. */

</style>
<style>/* CLM-NOLOOP-FIX */
*, *::before, *::after {
  animation-iteration-count: 1 !important;
  animation-fill-mode: forwards !important;
}
</style>
</head>

<script>
  // ----- Count-up engine + master 12s loop -----
  const stage = document.getElementById('stage');

  function formatNum(n, opts) {
    if (opts.format === 'comma') {
      return Math.round(n).toLocaleString('en-US');
    }
    if (opts.decimals) {
      return n.toFixed(opts.decimals);
    }
    return Math.round(n).toString();
  }

  function animateCount(el) {
    const target = parseFloat(el.dataset.count);
    const suffix = el.dataset.suffix || '';
    const delay = parseInt(el.dataset.delay || '0', 10);
    const decimals = el.dataset.decimals ? parseInt(el.dataset.decimals, 10) : 0;
    const format = el.dataset.format || '';
    const duration = 1500;
    const startVal = 0;
    el.textContent = formatNum(0, {decimals, format}) + suffix;

    setTimeout(() => {
      const start = performance.now();
      function tick(now) {
        const t = Math.min(1, (now - start) / duration);
        if (t >= 1) {
          el.textContent = formatNum(target, {decimals, format}) + suffix;
          return;
        }
        // ease-out cubic
        const e = 1 - Math.pow(1 - t, 3);
        const v = startVal + (target - startVal) * e;
        el.textContent = formatNum(v, {decimals, format}) + suffix;
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }, delay);
  }

  function runCycle() {
    document.querySelectorAll('.count').forEach(animateCount);
  }

  function restart() {
    // Clone the frame to retrigger all CSS animations
    const old = document.getElementById('frame');
    const fresh = old.cloneNode(true);
    old.parentNode.replaceChild(fresh, old);
    runCycle();
  }

  // Initial
  runCycle();

  // Loop every 12s
  setInterval(restart, 12000);
</script>
</body>
</html>
