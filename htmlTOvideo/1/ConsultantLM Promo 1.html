<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ConsultantLM — AI Ads Promo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<template id="__bundler_thumbnail" data-bg-color="#ffffff">
  <svg viewBox="0 0 360 640" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#ffffff"/>
        <stop offset="0.5" stop-color="#fafbfc"/>
        <stop offset="1" stop-color="#f5f7fa"/>
      </linearGradient>
      <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
        <stop offset="0" stop-color="#00b4d8" stop-opacity="0.15"/>
        <stop offset="1" stop-color="#00b4d8" stop-opacity="0"/>
      </radialGradient>
    </defs>
    <rect width="360" height="640" fill="url(#bg)"/>
    <circle cx="180" cy="280" r="160" fill="url(#glow)"/>
    <circle cx="180" cy="280" r="108" fill="none" stroke="#00b4d8" stroke-opacity="0.15" stroke-dasharray="4 5"/>
    <circle cx="180" cy="280" r="44" fill="#f5f7fa" stroke="#00b4d8" stroke-width="2"/>
    <text x="180" y="290" text-anchor="middle" font-family="Inter, sans-serif" font-weight="800" font-size="22" fill="#1a1a2e">JD</text>
    <circle cx="180" cy="172" r="14" fill="#ff0033"/>
    <circle cx="273" cy="226" r="14" fill="#1877f2"/>
    <circle cx="273" cy="334" r="14" fill="#0a66c2"/>
    <circle cx="180" cy="388" r="14" fill="#000"/>
    <circle cx="87"  cy="334" r="14" fill="#fff"/>
    <circle cx="87"  cy="226" r="14" fill="#ee2a7b"/>
    <rect x="24" y="470" width="312" height="100" rx="16" fill="#f5f7fa" fill-opacity="0.95" stroke="#e5e7eb" stroke-opacity="1"/>
    <text x="40" y="520" font-family="Inter, sans-serif" font-weight="800" font-size="28" fill="#00b4d8">47</text>
    <text x="200" y="520" font-family="Inter, sans-serif" font-weight="800" font-size="28" fill="#00b4d8">$142K</text>
  </svg>
</template>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%;
    min-height: 100vh;
    background: #ffffff;
    font-family: 'Inter', system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #1a1a2e;
    -webkit-font-smoothing: antialiased;
  }

  /* ----- Canvas ----- */
  .canvas {
    position: relative;
    width: 360px;
    height: 640px;
    overflow: hidden;
    border-radius: 22px;
    background: linear-gradient(180deg, #ffffff 0%, #fafbfc 50%, #f5f7fa 100%);
    box-shadow: 0 30px 80px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.06);
    isolation: isolate;
  }

  /* Soft ambient glow */
  .canvas::before {
    content: "";
    position: absolute;
    top: 38%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 320px;
    height: 320px;
    background: radial-gradient(circle, rgba(0,180,216,0.08) 0%, rgba(0,180,216,0) 65%);
    pointer-events: none;
    z-index: 0;
  }
  .canvas::after {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(1px 1px at 20% 18%, rgba(0,180,216,0.15) 50%, transparent 100%),
      radial-gradient(1px 1px at 80% 12%, rgba(0,180,216,0.1) 50%, transparent 100%),
      radial-gradient(1px 1px at 70% 88%, rgba(0,180,216,0.12) 50%, transparent 100%),
      radial-gradient(1px 1px at 12% 78%, rgba(0,180,216,0.1) 50%, transparent 100%),
      radial-gradient(1px 1px at 50% 6%, rgba(0,180,216,0.08) 50%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* ----- Logo ----- */
  .logo {
    position: absolute;
    top: 16px;
    left: 16px;
    z-index: 5;
    display: flex;
    flex-direction: column;
    line-height: 1.1;
    opacity: 0;
    animation: fadeUp 0.6s ease-out 0s forwards;
    animation-iteration-count: infinite;
    animation-duration: 12s;
  }
  .logo-mark {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    color: #1a1a2e;
  }
  .logo-mark::before {
    content: "";
    width: 10px;
    height: 10px;
    border-radius: 3px;
    background: linear-gradient(135deg, #00b4d8, #4cc9f0);
    box-shadow: 0 0 10px rgba(0,180,216,0.3);
  }
  .logo-sub {
    margin-top: 3px;
    margin-left: 16px;
    font-size: 8px;
    font-weight: 500;
    letter-spacing: 0.22em;
    color: #94a3b8;
  }

  .live-pill {
    position: absolute;
    top: 18px;
    right: 16px;
    z-index: 5;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 9px 4px 8px;
    border-radius: 20px;
    background: rgba(0,0,0,0.03);
    border: 1px solid #e5e7eb;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: #94a3b8;
    opacity: 0;
    animation: fadeUp 0.6s ease-out 0s forwards;
    animation-iteration-count: infinite;
    animation-duration: 12s;
  }
  .live-pill .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #10b981;
    box-shadow: 0 0 8px #10b981;
  }

  /* ----- Heading ----- */
  .headline {
    position: absolute;
    top: 60px;
    left: 0;
    right: 0;
    padding: 0 24px;
    text-align: center;
    z-index: 4;
    opacity: 0;
    animation: fadeUp 0.9s ease-out 0s forwards;
    animation-iteration-count: infinite;
    animation-duration: 12s;
  }
  .headline h1 {
    font-size: 22px;
    font-weight: 700;
    line-height: 1.25;
    color: #1a1a2e;
    letter-spacing: -0.01em;
  }
  .headline .accent {
    color: #00b4d8;
    font-style: italic;
    font-weight: 800;
  }
  .headline p {
    margin-top: 8px;
    font-size: 12px;
    font-weight: 400;
    color: #94a3b8;
    letter-spacing: 0.02em;
  }

  /* ----- Orbital section ----- */
  .orbit-wrap {
    position: absolute;
    top: 168px;
    left: 50%;
    transform: translateX(-50%);
    width: 280px;
    height: 280px;
    z-index: 3;
  }

  .orbit-ring {
    position: absolute;
    inset: 18px;
    border: 1px dashed rgba(0,0,0,0.08);
    border-radius: 50%;
    opacity: 0;
    animation: fadeIn 0.6s ease-out 0s forwards;
    animation-iteration-count: infinite;
    animation-duration: 12s;
  }
  .orbit-ring.outer {
    inset: -4px;
    border-color: rgba(0,180,216,0.12);
  }

  /* spinning aura */
  .aura {
    position: absolute;
    inset: 38px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, rgba(0,180,216,0) 0deg, rgba(0,180,216,0.5) 60deg, rgba(0,180,216,0) 120deg, rgba(76,201,240,0.4) 200deg, rgba(0,180,216,0) 260deg, rgba(0,180,216,0.5) 340deg);
    filter: blur(8px);
    opacity: 0;
    animation: auraSpin 6s linear infinite, auraAppear 1s ease-out 0s forwards;
    animation-duration: 12s, 12s;
  }
  @keyframes auraSpin {
    0%   { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  @keyframes auraAppear {
    0%, 12%   { opacity: 0; }
    18%, 100% { opacity: 0.55; }
  }

  /* ----- Avatar (9:16 portrait video card) ----- */
  .avatar {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 108px;
    height: 192px; /* 9:16 ratio */
    border-radius: 18px;
    transform: translate(-50%, -50%) scale(0);
    background: linear-gradient(135deg, #f5f7fa 0%, #eef1f5 100%);
    border: 2px solid rgba(0,180,216,0.55);
    box-shadow: 0 16px 44px rgba(0,0,0,0.1), 0 0 32px rgba(0,180,216,0.15), inset 0 0 0 4px rgba(0,0,0,0.02);
    overflow: hidden;
    z-index: 4;
    animation: avatarPop 0.9s cubic-bezier(.2,.9,.3,1.4) 1.5s forwards;
    animation-iteration-count: infinite;
    animation-duration: 12s;
  }
  .avatar video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .avatar::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0) 55%, rgba(0,0,0,0.35) 100%);
    pointer-events: none;
  }
  /* Caption overlay sits INSIDE the video card, pinned to its bottom */
  .avatar-meta {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    padding: 14px 8px 8px;
    text-align: center;
    z-index: 2;
    pointer-events: none;
    background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.45) 55%, rgba(0,0,0,0.72) 100%);
    opacity: 0;
    transform: translateY(8px);
    animation: metaIn 12s ease-out infinite;
  }
  @keyframes metaIn {
    0%, 22%   { opacity: 0; transform: translateY(8px); }
    28%, 100% { opacity: 1; transform: translateY(0); }
  }
  .avatar-meta .name {
    font-size: 11px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.02em;
    line-height: 1.1;
  }
  .avatar-meta .role {
    margin-top: 2px;
    font-size: 7px;
    font-weight: 600;
    color: #e0e0e0;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  @keyframes avatarPop {
    0%, 12%      { transform: translate(-50%, -50%) scale(0); opacity: 0; }
    20%          { transform: translate(-50%, -50%) scale(1.08); opacity: 1; }
    25%, 100%    { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  }

  /* ----- Social icons positioned on circle ----- */
  .social {
    position: absolute;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    top: 50%;
    left: 50%;
    margin: -19px 0 0 -19px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    box-shadow: 0 4px 14px rgba(0,0,0,0.12), inset 0 0 0 1px rgba(0,0,0,0.06);
    opacity: 0;
    transform: translate(0,0) scale(0.4);
    z-index: 5;
  }
  .social svg { width: 18px; height: 18px; display: block; }

  /* 6 positions around the portrait card */
  .social.s1 { --x:    0px; --y: -128px; background: #ff0033; }                     /* top - YouTube */
  .social.s2 { --x:  118px; --y:  -68px; background: #1877f2; }                     /* upper right - Facebook */
  .social.s3 { --x:  118px; --y:   68px; background: #0a66c2; }                     /* lower right - LinkedIn */
  .social.s4 { --x:    0px; --y:  128px; background: #000; border:1px solid rgba(0,0,0,0.12); } /* bottom - TikTok */
  .social.s5 { --x: -118px; --y:   68px; background: #fff; }                        /* lower left - Google */
  .social.s6 { --x: -118px; --y:  -68px; background: linear-gradient(135deg,#fdb913 0%,#ee2a7b 50%,#6228d7 100%); } /* upper left - Instagram */

  /* Each icon's animation runs once per 12s loop. Start state (hidden at center)
     is set by the static .social rule above; the animation overrides only its
     own timeline window. animation-fill-mode: both keeps icons hidden BEFORE
     the delay starts, and locked in place AFTER it ends. */
  .social {
    animation: socialIn 0.9s cubic-bezier(.22,.61,.36,1) both infinite;
    animation-duration: 0.9s, 12s; /* fly-in 0.9s, then loop period 12s via wrapper */
  }
  /* Use a single 12s keyframe with negative-delay-free timing so icons remain hidden until their slot. */
  .social { animation: socialLoop 12s linear infinite; }
  .social.s1 { animation-delay:  0s;    --t0: 19.5; } /* 2.34/12 = 19.5%  */
  .social.s2 { animation-delay:  0s;    --t0: 20.5; } /* 2.46/12 = 20.5%  */
  .social.s3 { animation-delay:  0s;    --t0: 21.5; } /* 2.58/12 = 21.5%  */
  .social.s4 { animation-delay:  0s;    --t0: 22.5; } /* 2.70/12 = 22.5%  */
  .social.s5 { animation-delay:  0s;    --t0: 23.5; } /* 2.82/12 = 23.5%  */
  .social.s6 { animation-delay:  0s;    --t0: 24.5; } /* 2.94/12 = 24.5%  */

  /* Per-icon keyframes: each gets its own animation that fully controls 12s.
     Hidden 0%->just-before-window, smooth tween across ~7%, hold to 100%. */
  .social.s1 { animation-name: flyS1; }
  .social.s2 { animation-name: flyS2; }
  .social.s3 { animation-name: flyS3; }
  .social.s4 { animation-name: flyS4; }
  .social.s5 { animation-name: flyS5; }
  .social.s6 { animation-name: flyS6; }

  /* Single shared easing baked into the keyframe shape (cubic-bezier-ish via extra stop) */
  @keyframes flyS1 {
    0%, 19.4%   { transform: translate(0,0) scale(0.4); opacity: 0; }
    27%         { transform: translate(0px, -128px) scale(1); opacity: 1; }
    100%        { transform: translate(0px, -128px) scale(1); opacity: 1; }
  }
  @keyframes flyS2 {
    0%, 20.4%   { transform: translate(0,0) scale(0.4); opacity: 0; }
    28%         { transform: translate(118px, -68px) scale(1); opacity: 1; }
    100%        { transform: translate(118px, -68px) scale(1); opacity: 1; }
  }
  @keyframes flyS3 {
    0%, 21.4%   { transform: translate(0,0) scale(0.4); opacity: 0; }
    29%         { transform: translate(118px, 68px) scale(1); opacity: 1; }
    100%        { transform: translate(118px, 68px) scale(1); opacity: 1; }
  }
  @keyframes flyS4 {
    0%, 22.4%   { transform: translate(0,0) scale(0.4); opacity: 0; }
    30%         { transform: translate(0px, 128px) scale(1); opacity: 1; }
    100%        { transform: translate(0px, 128px) scale(1); opacity: 1; }
  }
  @keyframes flyS5 {
    0%, 23.4%   { transform: translate(0,0) scale(0.4); opacity: 0; }
    31%         { transform: translate(-118px, 68px) scale(1); opacity: 1; }
    100%        { transform: translate(-118px, 68px) scale(1); opacity: 1; }
  }
  @keyframes flyS6 {
    0%, 24.4%   { transform: translate(0,0) scale(0.4); opacity: 0; }
    32%         { transform: translate(-118px, -68px) scale(1); opacity: 1; }
    100%        { transform: translate(-118px, -68px) scale(1); opacity: 1; }
  }

  .social .tag {
    position: absolute;
    top: -8px;
    right: -8px;
    background: #10b981;
    color: #fff;
    font-size: 8px;
    font-weight: 800;
    padding: 2px 5px;
    border-radius: 8px;
    border: 1.5px solid #ffffff;
    letter-spacing: 0.04em;
    opacity: 0;
    animation: tagIn 0.4s ease-out 0s forwards;
    animation-iteration-count: infinite;
    animation-duration: 12s;
  }
  @keyframes tagIn {
    0%, 38%    { opacity: 0; transform: scale(0.5); }
    42%        { opacity: 1; transform: scale(1.1); }
    46%, 100%  { opacity: 1; transform: scale(1); }
  }

  /* Connection lines (SVG) */
  .connect-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 2;
  }
  .connect-svg line {
    stroke: rgba(0,180,216,0.55);
    stroke-width: 1;
    stroke-dasharray: 3 4;
    stroke-dashoffset: 200;
    animation: drawLine 1.2s ease-out forwards;
    animation-iteration-count: infinite;
    animation-duration: 12s;
  }
  .connect-svg line:nth-child(1) { animation-delay: 4.0s; }
  .connect-svg line:nth-child(2) { animation-delay: 4.1s; }
  .connect-svg line:nth-child(3) { animation-delay: 4.2s; }
  .connect-svg line:nth-child(4) { animation-delay: 4.3s; }
  .connect-svg line:nth-child(5) { animation-delay: 4.4s; }
  .connect-svg line:nth-child(6) { animation-delay: 4.5s; }
  @keyframes drawLine {
    0%, 33%   { stroke-dashoffset: 200; opacity: 0; }
    36%       { opacity: 1; }
    45%, 100% { stroke-dashoffset: 0; opacity: 1; }
  }

  /* particles flowing along lines */
  .pulse-dot {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 4px;
    height: 4px;
    margin: -2px 0 0 -2px;
    border-radius: 50%;
    background: #4cc9f0;
    box-shadow: 0 0 8px #00b4d8;
    opacity: 0;
    z-index: 3;
  }
  .pulse-dot.p1 { animation: pulseTo 1.6s ease-in-out 0s infinite; --tx:    0px; --ty: -128px; }
  .pulse-dot.p2 { animation: pulseTo 1.6s ease-in-out 0s infinite; --tx:  118px; --ty:  -68px; }
  .pulse-dot.p3 { animation: pulseTo 1.6s ease-in-out 0s infinite; --tx:  118px; --ty:   68px; }
  .pulse-dot.p4 { animation: pulseTo 1.6s ease-in-out 0s infinite; --tx:    0px; --ty:  128px; }
  .pulse-dot.p5 { animation: pulseTo 1.6s ease-in-out 0s infinite; --tx: -118px; --ty:   68px; }
  .pulse-dot.p6 { animation: pulseTo 1.6s ease-in-out 0s infinite; --tx: -118px; --ty:  -68px; }
  @keyframes pulseTo {
    0%   { transform: translate(var(--tx), var(--ty)) scale(0.6); opacity: 0; }
    20%  { opacity: 1; }
    100% { transform: translate(0,0) scale(1.2); opacity: 0; }
  }

  /* ----- Results card ----- */
  .results {
    position: absolute;
    left: 16px;
    right: 16px;
    bottom: 70px;
    padding: 14px 14px 12px;
    background: #f5f7fa;
    border: 1px solid #e5e7eb;
    border-radius: 16px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.06);
    opacity: 0;
    transform: translateY(20px);
    z-index: 4;
    animation: fadeUp 0.7s ease-out 0s forwards;
    animation-iteration-count: infinite;
    animation-duration: 12s;
  }
  .results-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .results-title {
    font-size: 11px;
    font-weight: 600;
    color: #94a3b8;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }
  .badge {
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    background: rgba(16,185,129,0.15);
    color: #10b981;
    letter-spacing: 0.02em;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    opacity: 0;
    transform: scale(0.6);
    animation: badgePulse 1s ease-out 0s forwards;
    animation-iteration-count: infinite;
    animation-duration: 12s;
  }
  .badge::before {
    content: "▲";
    font-size: 8px;
  }
  @keyframes badgePulse {
    0%, 60%    { opacity: 0; transform: scale(0.6); }
    66%        { opacity: 1; transform: scale(1.15); }
    72%        { transform: scale(1); }
    100%       { opacity: 1; transform: scale(1); }
  }

  .stats {
    display: grid;
    grid-template-columns: 1fr 1px 1fr;
    gap: 8px;
    align-items: center;
  }
  .divider {
    width: 1px;
    height: 42px;
    background: #e5e7eb;
    justify-self: center;
  }
  .stat-label {
    font-size: 10px;
    font-weight: 500;
    color: #94a3b8;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .stat-value {
    font-size: 28px;
    font-weight: 800;
    color: #00b4d8;
    line-height: 1;
    letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums;
  }
  .stat-value .currency {
    font-size: 16px;
    font-weight: 700;
    margin-right: 1px;
    vertical-align: top;
    line-height: 1.5;
  }
  .stat-trend {
    margin-top: 6px;
    height: 4px;
    background: #e5e7eb;
    border-radius: 3px;
    overflow: hidden;
  }
  .stat-trend > span {
    display: block;
    height: 100%;
    width: 0;
    background: linear-gradient(90deg, #00b4d8, #4cc9f0);
    border-radius: 3px;
    animation: barFill 1.2s ease-out 0s forwards;
    animation-iteration-count: infinite;
    animation-duration: 12s;
  }
  .stat-trend.b2 > span { animation-delay: 5.7s; }
  @keyframes barFill {
    0%, 42%   { width: 0; }
    52%       { width: var(--w, 78%); }
    100%      { width: var(--w, 78%); }
  }

  /* ----- Footer Live Bar ----- */
  .live-bar {
    position: absolute;
    left: 16px;
    right: 16px;
    bottom: 18px;
    height: 38px;
    border-radius: 12px;
    background: rgba(16,185,129,0.08);
    border: 1px solid rgba(16,185,129,0.25);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 14px;
    overflow: hidden;
    z-index: 4;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 0.6s ease-out 0s forwards;
    animation-iteration-count: infinite;
    animation-duration: 12s;
  }
  .live-bar::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(16,185,129,0.18), transparent);
    transform: translateX(-100%);
    animation: shimmer 2.4s ease-in-out 0s infinite;
    animation-duration: 12s;
  }
  @keyframes shimmer {
    0%, 70%  { transform: translateX(-100%); }
    85%, 100%{ transform: translateX(100%); }
  }
  .live-bar .left {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #1a1a2e;
    z-index: 1;
  }
  .live-bar .pulse {
    position: relative;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #10b981;
    box-shadow: 0 0 10px #10b981;
  }
  .live-bar .pulse::after {
    content: "";
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    border: 1.5px solid #10b981;
    animation: ring 1.6s ease-out infinite;
  }
  @keyframes ring {
    0%   { transform: scale(0.6); opacity: 1; }
    100% { transform: scale(1.8); opacity: 0; }
  }
  .live-bar .right {
    font-size: 10px;
    font-weight: 600;
    color: #94a3b8;
    letter-spacing: 0.08em;
    z-index: 1;

  }

  /* ----- Generic helpers ----- */
  @keyframes fadeUp {
    0%, 1%  { opacity: 0; transform: translateY(20px); }
    8%      { opacity: 1; transform: translateY(0); }
    100%    { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    0%, 11% { opacity: 0; }
    14%     { opacity: 1; }
    100%    { opacity: 1; }
  }

  /* Tiny credits / explainer outside the canvas */

    position: fixed;

    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: #94a3b8;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
</style>

<script>
  // Count-up animation that re-runs every loop
  const c1 = document.getElementById('c1');
  const c2 = document.getElementById('c2');

  function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

  function runCount(el, target, duration, isMoney) {
    const start = performance.now();
    function frame(now) {
      const t = Math.min(1, (now - start) / duration);
      const v = Math.round(target * easeOutCubic(t));
      el.textContent = isMoney ? v.toLocaleString('en-US') : v.toString();
      if (t < 1) requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  }

  function startCounters() {
    c1.textContent = '0';
    c2.textContent = '0';
    runCount(c1, 47, 1500, false);
    runCount(c2, 142000, 1700, true);
  }

  // Start at 5s into the loop, every 12s
  function loopCounters() {
    setTimeout(startCounters, 5000);
    setInterval(startCounters, 12000);
  }
  loopCounters();
</script>
